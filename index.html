<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Contact Me | Professional Portfolio</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&family=Roboto:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
    <h1 class="text-center">Contact Me</h1>
    <form class="contact-form" action="#" method="POST">
        
        <div class="form-group">
            <i class="fa fa-user fa-fw"></i>
            <input class="form-control" type="text" placeholder="Username" required>
            <span class="asterisx">*</span>
        </div>

        <div class="form-group">
            <i class="fa fa-envelope fa-fw"></i>
            <input class="form-control" type="email" placeholder="Email Address" required>
            <span class="asterisx">*</span>
        </div>

        <div class="form-group">
            <i class="fa fa-phone fa-fw"></i>
            <input class="form-control" type="tel" placeholder="Phone Number">
        </div>

        <div class="form-group">
            <i class="fa fa-comment fa-fw"></i>
            <textarea class="form-control" placeholder="Your Message!"></textarea>
            <span class="asterisx">*</span>
        </div>

        <button type="submit" class="btn-send">
            <i class="fa fa-send"></i> SEND MESSAGE
        </button>
        
    </form>
</div>

    <script src="js/jquery-1.12.4.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/custom.js"></script>
</body>

</html>
