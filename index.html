<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Contact Me | Professional Portfolio</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
    <link rel="stylesheet" href="css/contact.css"/>
    <link rel="stylesheet" href="css/font-awesome.min.css"/>

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&family=Roboto:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="container">
        <h1 class="text-center">Contact Me</h1>
      
        <form class="contact-form" action="#" method="POST">
            
            <div class="form-group">
                <i class="fa fa-user fa-fw"></i>
                <input class="username form-control" type="text" name="username" placeholder="Type your username" required>
                <span class="asterisx">*</span>
            </div>

            <div class="form-group">
                <i class="fa fa-envelope fa-fw"></i>
                <input class="email form-control" type="email" name="email" placeholder="Please type a valid email" required>
                <span class="asterisx">*</span>
            </div>

            <div class="form-group">
                <i class="fa fa-phone fa-fw"></i>
                <input class="form-control" type="tel" name="cellphone" placeholder="Type your cell phone">
            </div>

            <div class="form-group">
                <i class="fa fa-comment fa-fw"></i> <textarea class="message form-control" name="message" placeholder="Your message!"></textarea>
                <span class="asterisx">*</span>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-success">
                    <i class="fa fa-send fa-fw"></i> SEND MESSAGE
                </button>
            </div>
            
        </form>
    </div>

    <script src="js/jquery-1.12.4.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/custom.js"></script>
</body>
</html>
